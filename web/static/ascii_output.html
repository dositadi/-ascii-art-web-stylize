{{define "ascii-output"}}
<!-- OUTPUT: STANDARD FONT -->
<div class="output-result" id="output-result-standard" aria-label="Standard font ASCII art output">
    <div class="output-pre-wrap">
        <div class="pre-toolbar">
            <span class="pre-dot pre-dot-r" aria-hidden="true"></span>
            <span class="pre-dot pre-dot-y" aria-hidden="true"></span>
            <span class="pre-dot pre-dot-g" aria-hidden="true"></span>
            <span class="pre-filename" aria-hidden="true">output_standard.txt</span>
            <a href="#generator" class="pre-copy-btn" aria-label="Copy to clipboard">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" aria-hidden="true">
                    <rect x="9" y="9" width="13" height="13" rx="2" />
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                </svg>
                Copy
            </a>
        </div>
        <pre class="ascii-output" aria-label="Standard font ASCII art result">{{.AsciiOutput}}</pre>
    </div>
    <div class="output-meta">
        <div class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" aria-hidden="true">
                <polyline points="16 18 22 12 16 6" />
                <polyline points="8 6 2 12 8 18" />
            </svg>
            Font: <span class="meta-badge">{{.Font}}</span>
        </div>
        <div class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <path d="M3 9h18M9 21V9" />
            </svg>
            Width: <span class="meta-badge">{{.Width}}</span>
        </div>
        <div class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Lines: <span class="meta-badge">{{.Lines}}</span>
        </div>
    </div>
</div>
{{end}}
